<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Women's Day</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#050510;
overflow:hidden;
font-family:Poppins;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
}

.title{

position:absolute;
top:40%;
width:100%;

font-family:'Dancing Script',cursive;

font-size:60px;

color:#fff;

text-shadow:
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;

animation:fadeIn 3s;

}

.subtitle{

margin-top:20px;

font-size:28px;

font-family:Poppins;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.heart{

position:absolute;
color:#ff4d6d;

animation:fly 6s linear infinite;

}

@keyframes fly{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-800px);
opacity:0;
}

}

.petal{

position:absolute;

font-size:22px;

animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(0deg);
}

100%{
transform:translateY(100vh) rotate(360deg);
}

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="title">

🌸 Chúc mừng ngày Quốc tế Phụ nữ 8/3 🌸

<div class="subtitle">

Chúc bạn luôn xinh đẹp, hạnh phúc  
và tràn đầy yêu thương ❤️

</div>

</div>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-11741.mp3">
</audio>

<script>

const canvas=document.getElementById("canvas")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(x,y,color){

this.x=x
this.y=y
this.color=color

let angle=Math.random()*Math.PI*2

let speed=Math.random()*6

this.vx=Math.cos(angle)*speed
this.vy=Math.sin(angle)*speed

this.life=100

}

update(){

this.x+=this.vx
this.y+=this.vy

this.vy+=0.03

this.life--

}

draw(){

ctx.beginPath()

ctx.arc(this.x,this.y,2,0,Math.PI*2)

ctx.fillStyle=this.color

ctx.fill()

}

}

function firework(){

let x=Math.random()*canvas.width

let y=Math.random()*canvas.height/2

const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2","#f72585"]

for(let i=0;i<150;i++){

particles.push(

new Particle(x,y,colors[Math.floor(Math.random()*colors.length)])

)

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"

ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.update()

p.draw()

if(p.life<=0){

particles.splice(i,1)

}

})

requestAnimationFrame(animate)

}

animate()

setInterval(firework,800)

function createHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*window.innerWidth+"px"

heart.style.top=window.innerHeight+"px"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},800)

}

createHearts()

function createPetals(){

setInterval(()=>{

let p=document.createElement("div")

p.className="petal"

p.innerHTML="🌸"

p.style.left=Math.random()*window.innerWidth+"px"

p.style.animationDuration=(6+Math.random()*5)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),10000)

},500)

}

createPetals()

</script>

</body>
</html>
